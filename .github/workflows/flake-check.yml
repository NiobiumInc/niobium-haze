name: flake-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flake-check-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

# Two parallel jobs. `lint` is the ctcache-backed clang-tidy gate;
# `flake-check` builds the pure-nix derivations nothing else covers
# (nixfmt + haze + devshell). Magic Nix Cache shares /nix/store.
jobs:
  lint:
    name: clang-tidy
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout (with private niobium-fhetch submodule)
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          fetch-depth: 1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Verify nested submodules cloned
        run: |
          test -f vendor/niobium-fhetch/vendor/openfhe/CMakeLists.txt
          test -d vendor/niobium-fhetch/vendor/json

      - name: Verify flake.lock niobium-fhetch rev matches submodule
        # Strict gate: the niobium-fhetch flake input must pin the same
        # rev haze's index records for the submodule, else nix and
        # `make build` test different sources. Realign after a bump with
        # scripts/sync-fhetch-rev.sh.
        run: |
          submodule_rev=$(git ls-tree HEAD vendor/niobium-fhetch | awk '{print $3}')
          lock_rev=$(jq -r '.nodes."niobium-fhetch-src".locked.rev' flake.lock)
          if [ "$submodule_rev" != "$lock_rev" ]; then
            echo "::error::niobium-fhetch submodule rev ($submodule_rev) does not match flake.lock ($lock_rev)."
            echo "Run scripts/sync-fhetch-rev.sh and commit flake.lock."
            exit 1
          fi

      - name: Configure git to use App token for github.com fetches
        # The runner has no SSH key, so rewrite ssh://git@github.com/ ->
        # https with the App token; nix's libgit2 fetcher honors insteadOf
        # for the niobium-fhetch input and its ?submodules=1 sub-fetches.
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # --add: insteadOf is multivalued, both forms must coexist.
          git config --global --add \
            "url.https://x-access-token:${APP_TOKEN}@github.com/.insteadOf" \
            "ssh://git@github.com/"
          git config --global --add \
            "url.https://x-access-token:${APP_TOKEN}@github.com/.insteadOf" \
            "git@github.com:"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build compile_commands.json
        # Configure-only flake derivation yielding a hermetic
        # compile_commands.json (openfhe/fhetch stay cached). Swap the
        # __HAZE_ROOT__ sentinel for the workspace, and pre-create each
        # entry's build dir since clang-tidy chdir's into it.
        run: |
          nix build -L .#haze-compile-commands -o build-cc-nix
          mkdir -p build
          sed "s|__HAZE_ROOT__|$GITHUB_WORKSPACE|g" \
            build-cc-nix/compile_commands.json > build/compile_commands.json
          jq -r '.[].directory' build/compile_commands.json \
            | sort -u | xargs -r mkdir -p

      - name: Restore clang-tidy-cache
        # Persistent ctcache hash DB. Key binds .clang-tidy + flake.lock
        # + clang-tidy.sh; the commit SHA gives a unique save slot and
        # restore-keys resume from the latest match.
        id: ctcache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.ctcache
          key: ctcache-${{ runner.os }}-${{ hashFiles('.clang-tidy', 'flake.lock', 'scripts/clang-tidy.sh') }}-${{ github.sha }}
          restore-keys: |
            ctcache-${{ runner.os }}-${{ hashFiles('.clang-tidy', 'flake.lock', 'scripts/clang-tidy.sh') }}-
            ctcache-${{ runner.os }}-

      - name: Run clang-tidy via cache
        # nix develop provides clang-tidy + the clang-tidy-cache wrapper.
        # CTCACHE_CLANG_TIDY points the wrapper at the real binary on a
        # miss; CTCACHE_DIR sits under $HOME so actions/cache covers it.
        run: |
          nix develop -L --command bash -c '
            export CTCACHE_DIR="$HOME/.ctcache"
            export CTCACHE_CLANG_TIDY="$(command -v clang-tidy)"
            CLANG_TIDY=clang-tidy-cache BUILD_DIR=build scripts/clang-tidy.sh
          '

      - name: Save clang-tidy-cache
        # always(): warm the next run even on partial state. ctcache
        # stores only successful verdicts, so it never caches a failure.
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ctcache
          key: ctcache-${{ runner.os }}-${{ hashFiles('.clang-tidy', 'flake.lock', 'scripts/clang-tidy.sh') }}-${{ github.sha }}

      - name: Collect nix build logs on failure
        if: failure()
        run: |
          sudo tar -czf nix-drv-logs.tgz -C / nix/var/log/nix/drvs 2>/dev/null || true
          ls -la nix-drv-logs.tgz || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-logs-${{ github.run_attempt }}
          path: nix-drv-logs.tgz
          if-no-files-found: ignore
          retention-days: 7

  flake-check:
    name: pure-nix build
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout (with private niobium-fhetch submodule)
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          fetch-depth: 1

      - name: Free disk space
        # nix store with openfhe + niobium-fhetch + haze easily blows
        # past ubuntu-latest's ~14 GB of free space. Reclaim ~25 GB up
        # front, same recipe as build-test.yml.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Verify nested submodules cloned
        run: |
          test -f vendor/niobium-fhetch/vendor/openfhe/CMakeLists.txt
          test -d vendor/niobium-fhetch/vendor/json

      - name: Verify flake.lock niobium-fhetch rev matches submodule
        # See lint job for rationale: strict gate that the flake input
        # rev equals the submodule rev recorded in haze's index.
        run: |
          submodule_rev=$(git ls-tree HEAD vendor/niobium-fhetch | awk '{print $3}')
          lock_rev=$(jq -r '.nodes."niobium-fhetch-src".locked.rev' flake.lock)
          if [ "$submodule_rev" != "$lock_rev" ]; then
            echo "::error::niobium-fhetch submodule rev ($submodule_rev) does not match flake.lock ($lock_rev)."
            echo "Run scripts/sync-fhetch-rev.sh and commit flake.lock."
            exit 1
          fi

      - name: Configure git to use App token for github.com fetches
        # See lint job: rewrites SSH github.com URLs to HTTPS with the
        # App token so libgit2 (used by nix's git fetcher) can pull
        # the niobium-fhetch flake input and its sub-submodules.
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global --add \
            "url.https://x-access-token:${APP_TOKEN}@github.com/.insteadOf" \
            "ssh://git@github.com/"
          git config --global --add \
            "url.https://x-access-token:${APP_TOKEN}@github.com/.insteadOf" \
            "git@github.com:"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Magic Nix Cache
        # Zero-config /nix/store cache (GitHub Actions cache). Covers
        # openfhe (~20-30 min cold), niobium-fhetch, and haze across runs.
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build pure-nix checks (nixfmt, haze build, devshell)
        # Not `nix flake check`: that also realizes clang-format, clang-tidy,
        # and the unit/sim tests, which clang-format.yml, the lint job, and
        # build-test.yml already gate. Build only what nothing else does.
        run: |
          nix build -L --keep-going \
            .#checks.x86_64-linux.fmt \
            .#checks.x86_64-linux.haze-build \
            .#checks.x86_64-linux.devshell-builds

      - name: Collect nix build logs on failure
        if: failure()
        # nix persists per-derivation logs under /nix/var/log/nix/drvs;
        # tar it for the full failed-derivation log even if -L truncated.
        run: |
          sudo tar -czf nix-drv-logs.tgz -C / nix/var/log/nix/drvs 2>/dev/null || true
          ls -la nix-drv-logs.tgz || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: flake-check-logs-${{ github.run_attempt }}
          path: nix-drv-logs.tgz
          if-no-files-found: ignore
          retention-days: 7
