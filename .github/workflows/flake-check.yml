name: flake-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flake-check-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

# Two-job pipeline. `lint` runs the clang-tidy flake derivation as a
# fast gate; `flake-check` runs the slower test suite only after lint
# succeeds. Magic Nix Cache shares the /nix/store across jobs so the
# second job reuses everything the first one built.
jobs:
  lint:
    name: clang-tidy
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout (with private niobium-fhetch submodule)
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          fetch-depth: 1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Verify nested submodules cloned
        run: |
          test -f vendor/niobium-fhetch/vendor/openfhe/CMakeLists.txt
          test -d vendor/niobium-fhetch/vendor/json

      - name: Verify flake.lock niobium-fhetch rev matches submodule
        # Strict gate: the niobium-fhetch flake input must pin the same
        # rev that haze's index records for the vendor/niobium-fhetch
        # submodule. Drift is impossible to merge because we'd be
        # building/testing different fhetch sources via nix vs. via
        # `make build`. After a fhetch bump, run scripts/sync-fhetch-rev.sh
        # to realign flake.lock with the new submodule rev.
        run: |
          submodule_rev=$(git ls-tree HEAD vendor/niobium-fhetch | awk '{print $3}')
          lock_rev=$(jq -r '.nodes."niobium-fhetch-src".locked.rev' flake.lock)
          if [ "$submodule_rev" != "$lock_rev" ]; then
            echo "::error::niobium-fhetch submodule rev ($submodule_rev) does not match flake.lock ($lock_rev)."
            echo "Run scripts/sync-fhetch-rev.sh and commit flake.lock."
            exit 1
          fi

      - name: Configure git to use App token for github.com fetches
        # nix's libgit2 fetcher resolves git+ssh://git@github.com/...
        # URLs in the flake. The runner has no SSH key, so rewrite
        # ssh://git@github.com/ -> https://x-access-token:${TOKEN}@github.com/
        # globally; libgit2 honors insteadOf rules. This covers both
        # the niobium-fhetch flake input and any sub-submodule fetches
        # (openfhe, json) that the input's `?submodules=1` triggers.
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # --add: insteadOf is multivalued, both forms must coexist.
          git config --global --add \
            "url.https://x-access-token:${APP_TOKEN}@github.com/.insteadOf" \
            "ssh://git@github.com/"
          git config --global --add \
            "url.https://x-access-token:${APP_TOKEN}@github.com/.insteadOf" \
            "git@github.com:"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build compile_commands.json
        # haze-compile-commands is a configure-only flake derivation
        # that hands us a hermetic compile_commands.json without
        # rebuilding openfhe / niobium-fhetch (those are cached via
        # Magic Nix Cache). The output uses a __HAZE_ROOT__ sentinel
        # for haze's source root; substitute it for the actual
        # workspace so clang-tidy reads the checked-out files.
        # Also pre-create the per-target build subdirs that cmake
        # would otherwise generate during a real build — clang-tidy
        # chdir's into each entry's `directory` and crashes if the
        # dir is missing.
        run: |
          nix build -L .#haze-compile-commands -o build-cc-nix
          mkdir -p build
          sed "s|__HAZE_ROOT__|$GITHUB_WORKSPACE|g" \
            build-cc-nix/compile_commands.json > build/compile_commands.json
          jq -r '.[].directory' build/compile_commands.json \
            | sort -u | xargs -r mkdir -p

      - name: Restore clang-tidy-cache
        # Persistent ctcache hash database across CI runs. Cache key
        # binds to .clang-tidy (the check set), flake.lock (toolchain
        # rev), and scripts/clang-tidy.sh itself (since the flag set
        # we pass to clang-tidy lives there); commit SHA gives each
        # run a unique save slot so we can resume from the most recent
        # match via restore-keys without ever clobbering.
        id: ctcache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.ctcache
          key: ctcache-${{ runner.os }}-${{ hashFiles('.clang-tidy', 'flake.lock', 'scripts/clang-tidy.sh') }}-${{ github.sha }}
          restore-keys: |
            ctcache-${{ runner.os }}-${{ hashFiles('.clang-tidy', 'flake.lock', 'scripts/clang-tidy.sh') }}-
            ctcache-${{ runner.os }}-

      - name: Run clang-tidy via cache
        # nix develop pulls in clang-tools (for the real clang-tidy)
        # and clang-tidy-cache (the wrapper). CTCACHE_CLANG_TIDY tells
        # the wrapper which real binary to delegate to on a cache
        # miss; default upstream is /usr/bin/clang-tidy which doesn't
        # exist in the nix environment. CTCACHE_DIR lives under $HOME
        # so it's covered by actions/cache above.
        run: |
          nix develop -L --command bash -c '
            export CTCACHE_DIR="$HOME/.ctcache"
            export CTCACHE_CLANG_TIDY="$(command -v clang-tidy)"
            CLANG_TIDY=clang-tidy-cache BUILD_DIR=build scripts/clang-tidy.sh
          '

      - name: Save clang-tidy-cache
        # `if: always()` ensures partial cache state (e.g. when lint
        # caught new findings on some files but cached others) still
        # warms the next run. ctcache only stores successful results,
        # so the cache never holds stale failure verdicts.
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ctcache
          key: ctcache-${{ runner.os }}-${{ hashFiles('.clang-tidy', 'flake.lock', 'scripts/clang-tidy.sh') }}-${{ github.sha }}

      - name: Collect nix build logs on failure
        if: failure()
        run: |
          sudo tar -czf nix-drv-logs.tgz -C / nix/var/log/nix/drvs 2>/dev/null || true
          ls -la nix-drv-logs.tgz || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-logs-${{ github.run_attempt }}
          path: nix-drv-logs.tgz
          if-no-files-found: ignore
          retention-days: 7

  flake-check:
    name: nix flake check
    needs: lint
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout (with private niobium-fhetch submodule)
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          fetch-depth: 1

      - name: Free disk space
        # nix store with openfhe + niobium-fhetch + haze easily blows
        # past ubuntu-latest's ~14 GB of free space. Reclaim ~25 GB up
        # front, same recipe as build-test.yml.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Verify nested submodules cloned
        run: |
          test -f vendor/niobium-fhetch/vendor/openfhe/CMakeLists.txt
          test -d vendor/niobium-fhetch/vendor/json

      - name: Verify flake.lock niobium-fhetch rev matches submodule
        # See lint job for rationale: strict gate that the flake input
        # rev equals the submodule rev recorded in haze's index.
        run: |
          submodule_rev=$(git ls-tree HEAD vendor/niobium-fhetch | awk '{print $3}')
          lock_rev=$(jq -r '.nodes."niobium-fhetch-src".locked.rev' flake.lock)
          if [ "$submodule_rev" != "$lock_rev" ]; then
            echo "::error::niobium-fhetch submodule rev ($submodule_rev) does not match flake.lock ($lock_rev)."
            echo "Run scripts/sync-fhetch-rev.sh and commit flake.lock."
            exit 1
          fi

      - name: Configure git to use App token for github.com fetches
        # See lint job: rewrites SSH github.com URLs to HTTPS with the
        # App token so libgit2 (used by nix's git fetcher) can pull
        # the niobium-fhetch flake input and its sub-submodules.
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global --add \
            "url.https://x-access-token:${APP_TOKEN}@github.com/.insteadOf" \
            "ssh://git@github.com/"
          git config --global --add \
            "url.https://x-access-token:${APP_TOKEN}@github.com/.insteadOf" \
            "git@github.com:"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Magic Nix Cache
        # Free, zero-config /nix/store cache backed by GitHub Actions
        # cache. Covers openfhe (~20-30 min cold), niobium-fhetch, and
        # haze across runs. Documented combo is nix-installer-action
        # then magic-nix-cache-action.
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: nix flake check
        # -L (= --print-build-logs) streams every derivation's build
        # log to the workflow output, so test failures and OpenFHE
        # build errors are visible inline. --keep-going lets every
        # check run before the job fails, matching local behaviour.
        run: nix flake check -L --keep-going

      - name: Collect nix build logs on failure
        if: failure()
        # /nix/var/log/nix/drvs/ is where nix persists per-derivation
        # build logs; tarballing it gives the failed derivation's full
        # log even if the streamed -L output was truncated.
        run: |
          sudo tar -czf nix-drv-logs.tgz -C / nix/var/log/nix/drvs 2>/dev/null || true
          ls -la nix-drv-logs.tgz || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: flake-check-logs-${{ github.run_attempt }}
          path: nix-drv-logs.tgz
          if-no-files-found: ignore
          retention-days: 7
