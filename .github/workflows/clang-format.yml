name: clang-format

on:
  pull_request:
    branches: [main]
  # Manual re-run from the Actions tab. Useful after touching .clang-format
  # without bumping a code commit.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: clang-format-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-format:
    name: Check clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ github.token }}

      - name: Install clang-format-19
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-19
          sudo update-alternatives --install /usr/bin/clang-format \
            clang-format /usr/bin/clang-format-19 100

      - name: Verify clang-format version
        run: clang-format --version

      - name: Check formatting
        id: check
        continue-on-error: true
        run: scripts/clang-format.sh --check

      - name: Apply fixes
        if: |
          steps.check.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: scripts/clang-format.sh

      - name: Commit fixes
        if: |
          steps.check.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: apply clang-format fixes"
          git push
          echo "Formatting fixes were applied and committed."

      - name: Fail for fork PRs with formatting issues
        if: |
          steps.check.outcome == 'failure' &&
          github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Formatting issues found. Please run scripts/clang-format.sh locally to fix them."
          exit 1
