name: clang-format

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual re-run from the Actions tab. Useful after touching .clang-format
  # without bumping a code commit.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: clang-format-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-format:
    name: Check clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install clang-format-19
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-19
          sudo update-alternatives --install /usr/bin/clang-format \
            clang-format /usr/bin/clang-format-19 100

      - name: Verify clang-format version
        run: clang-format --version

      - name: Run scripts/clang-format.sh --check
        # The script encapsulates the tree set, file globs, and
        # --dry-run -Werror flags so local runs (`scripts/clang-format.sh
        # --check`), `nix flake check` (the haze-clang-format derivation),
        # and this gate stay byte-for-byte identical. vendor/ is excluded
        # there for the same reason — upstream owns its formatting.
        run: scripts/clang-format.sh --check
