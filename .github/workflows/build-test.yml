name: build-test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build + sim tests (nix devshell)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Free disk space
        # Nix store + OpenFHE + haze build pushes ubuntu-latest's
        # ~14 GB of free space. Reclaim ~25 GB up front.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: Verify nested submodules cloned
        run: |
          test -f vendor/niobium-fhetch/vendor/openfhe/CMakeLists.txt
          test -d vendor/niobium-fhetch/vendor/json

      - name: Capture OpenFHE submodule commits
        # Cache key tracks both OpenFHE submodule revs (instrumented fork inside
        # niobium-fhetch, and the stock vendor/openfhe). Any bump invalidates.
        id: openfhe_rev
        run: |
          rev=$(git -C vendor/niobium-fhetch/vendor/openfhe rev-parse HEAD)
          stock_rev=$(git -C vendor/openfhe rev-parse HEAD)
          echo "rev=$rev" >> "$GITHUB_OUTPUT"
          echo "stock_rev=$stock_rev" >> "$GITHUB_OUTPUT"

      - name: Cache OpenFHE install dirs
        # The build/ directory caches CMake state, including absolute
        # paths to compilers in /nix/store. Bumping flake.lock changes
        # those store paths, which would leave CMakeCache.txt pointing
        # at non-existent compiler binaries on a fresh runner. Hashing
        # flake.lock into the key invalidates the cache whenever the
        # nix toolchain moves. The stock OpenFHE (vendor/openfhe) builds
        # into the same release `build/` dir and installs to
        # vendor/lib/openfhe-stock; cache both alongside the instrumented one.
        uses: actions/cache@v5
        with:
          path: |
            vendor/niobium-fhetch/vendor/lib/openfhe
            vendor/niobium-fhetch/vendor/openfhe/build
            vendor/lib/openfhe-stock
            vendor/openfhe/build
          key: ubuntu-latest-openfhe-haze-${{ hashFiles('flake.lock') }}-${{ steps.openfhe_rev.outputs.rev }}-${{ steps.openfhe_rev.outputs.stock_rev }}
          restore-keys: |
            ubuntu-latest-openfhe-haze-${{ hashFiles('flake.lock') }}-

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Magic Nix Cache
        # Free, zero-config cache of /nix/store via the GitHub Actions
        # cache. Restored after sunset by reverse-engineering the new
        # Actions cache API; documented combo is nix-installer-action
        # then magic-nix-cache-action.
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Verify devshell evaluates
        run: nix develop --command bash -c 'clang --version && cmake --version'

      - name: Build (OpenFHE + haze, release)
        run: nix develop --command make build MODE=release

      - name: Run unit suite (HAZE_TARGET=local, no FHE math)
        run: nix develop --command make test-unit MODE=release

      - name: Run sim suite (in-process FHETCH simulator)
        run: nix develop --command make test-sim MODE=release

      - name: Run e2e suite (public C ABI + stock OpenFHE, decrypt-verified)
        run: nix develop --command make test-e2e MODE=release

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ github.run_attempt }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/runs/
          if-no-files-found: ignore
          retention-days: 7
